name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UV_NO_EDITABLE: "1"
      DISCOFLOW_REPO_ROOT: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: 'python -m pip install uv'

      - name: Sync Python dependencies
        run: 'uv sync --dev --reinstall-package discoflow-cli'

      - name: Run Python tests
        run: 'uv run --no-editable pytest'

      - name: CLI help smoke test
        run: 'uv run --no-editable discoflow --help'

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: 'npm ci'
        working-directory: 'packages/n8n-nodes-discourse'

      - name: Run lint
        run: 'npm run lint'
        working-directory: 'packages/n8n-nodes-discourse'

      - name: Run build
        run: 'npm run build'
        working-directory: 'packages/n8n-nodes-discourse'

      - name: Enforce Creator Portal mirror parity
        run: 'npm run mirror:check'
        working-directory: 'packages/n8n-nodes-discourse'

      - name: Enforce node README parity
        run: |
          set -euo pipefail
          NODE_README="packages/n8n-nodes-discourse/README.md"

          grep -Fq 'Supports `Return All`, `Limit`, `Before`, `Page`, optional ordering fields (`Order`, `Ascending`, `Desc`), and `Simplify`.' "$NODE_README"
          grep -Fq 'optional additional fields: `Auto Track`, `Created At`, `Embed URL`, and `External ID`.' "$NODE_README"
          grep -Fq -- '- `Create`: creates a storage key via `POST /discourse-ai/ai-bot/artifact-key-values/{artifact_id}`.' "$NODE_README"
          grep -Fq -- '- `Update`: updates a storage key via `POST /discourse-ai/ai-bot/artifact-key-values/{artifact_id}`.' "$NODE_README"

      - name: Enforce MIT license consistency
        run: |
          set -euo pipefail
          ROOT_LICENSE="LICENSE.md"
          NODE_LICENSE="packages/n8n-nodes-discourse/LICENSE.md"

          grep -Fq 'Permission is hereby granted, free of charge' "$ROOT_LICENSE"
          grep -Fq 'Permission is hereby granted, free of charge' "$NODE_LICENSE"

          if grep -Fq 'Copyright 2022 n8n' "$ROOT_LICENSE" "$NODE_LICENSE"; then
            echo "Stale license holder text detected. Update license files to DiscoFlow ownership."
            exit 1
          fi
